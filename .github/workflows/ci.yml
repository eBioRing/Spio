name: styio-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - ai-dev
      - agent-dev

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      STYIO_LLVM_MAJOR: "18"
      STYIO_CMAKE_VERSION: "3.31.6"
      STYIO_PYTHON_VERSION: "3.13.5"

    steps:
      - name: Checkout styio-spio
        uses: actions/checkout@v5
        with:
          path: styio-spio

      - name: Checkout styio-nightly sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-nightly
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_type == 'branch' && github.ref_name || 'nightly' }}
          path: styio-nightly

      - name: Checkout styio-view sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-view
          ref: ai-dev
          path: styio-view

      - name: Set up standardized Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.STYIO_PYTHON_VERSION }}

      - name: Install standardized CMake / CTest
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user "cmake==${STYIO_CMAKE_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            clang-${STYIO_LLVM_MAJOR} \
            lld-${STYIO_LLVM_MAJOR} \
            llvm-${STYIO_LLVM_MAJOR}-dev \
            llvm-${STYIO_LLVM_MAJOR}-tools

      - name: Verify standardized toolchain
        run: |
          python3 --version
          cmake --version | head -n1
          ctest --version | head -n1
          clang-${STYIO_LLVM_MAJOR} --version | head -n1
          llvm-config-${STYIO_LLVM_MAJOR} --version

      - name: Docs gate
        working-directory: styio-spio
        run: ./scripts/docs-gate.sh

      - name: Checkpoint health
        working-directory: styio-spio
        run: ./scripts/checkpoint-health.sh --build-dir /home/runner/work/_temp/spio-build

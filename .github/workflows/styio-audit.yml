name: styio-audit

on:
  pull_request:
  push:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: styio-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      STYIO_PYTHON_VERSION: "3.13.5"

    steps:
      - name: Checkout Pafio
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: Pafio

      - name: Checkout released styio-audit policy
        uses: actions/checkout@v5
        with:
          repository: SymPolicy/styio-audit
          ref: stable
          path: styio-audit

      - name: Set up standardized Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.STYIO_PYTHON_VERSION }}

      - name: Fetch managed branch evidence
        working-directory: Pafio
        run: |
          for branch in release stable nightly; do
            git fetch --no-tags origin "+refs/heads/${branch}:refs/remotes/origin/${branch}" || true
          done

      - name: Run released styio-audit gate
        working-directory: Pafio
        run: |
          git -C ../styio-audit rev-parse HEAD
          python3 ../styio-audit/bin/styio-audit gate --repo . --project Pafio

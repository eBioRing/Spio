name: Submit Gate

on:
  pull_request:
  push:

jobs:
  submit-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: styio-spio

      - name: Check out styio-nightly sibling repository
        uses: actions/checkout@v4
        with:
          repository: Unka-Malloc/styio-nightly
          path: styio-nightly

      - name: Check out styio-view sibling repository
        uses: actions/checkout@v4
        with:
          repository: Unka-Malloc/styio-view
          path: styio-view

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unified submit gate
        working-directory: styio-spio
        run: python3 scripts/submit-gate.py --profile ci --json

[spio]
manifest-version = 1

[package]
name = "acme/app"
version = "0.2.0"
edition = "2026"
publish = false

[toolchain]
channel = "nightly"
implicit-std = true

[[bin]]
name = "app"
path = "src/main.styio"

[dependencies]
core = { package = "acme/core", path = "../core" }
feed = { package = "acme/feed", git = "https://example.com/feed.git", rev = "4f2c9b1" }
